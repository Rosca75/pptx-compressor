<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    PPTX Compressor app icon.
    Concept: a white presentation slide on a PowerPoint-orange rounded square,
    with two block arrows converging vertically = "compress the slide".
    This SVG is the human-editable source of truth. build/icongen rasterizes it
    (in this exact 0..1024 coordinate space) to appicon.png and windows/icon.ico.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA5A2D"/>
      <stop offset="1" stop-color="#C0341A"/>
    </linearGradient>
  </defs>

  <!-- PowerPoint-orange rounded square -->
  <rect x="40" y="40" width="944" height="944" rx="210" ry="210" fill="url(#bg)"/>

  <!-- White presentation slide -->
  <rect x="252" y="317" width="520" height="390" rx="30" ry="30" fill="#FFFFFF"/>

  <!-- Compression arrows: two block arrows converging vertically -->
  <g fill="#D24726">
    <!-- top arrow, pointing down -->
    <path d="M467 360 H557 V408 H597 L512 498 L427 408 H467 Z"/>
    <!-- bottom arrow, pointing up -->
    <path d="M467 664 H557 V616 H597 L512 526 L427 616 H467 Z"/>
  </g>
</svg>
